# Dùng để kiểm tra cú pháp snippet (chạy từ thư mục deploy):
#   nginx -t -p "$(pwd)" -c nginx-social-preview.test.conf

worker_processes 1;
error_log off;
pid off;

events {
    worker_connections 64;
}

http {
    include nginx-social-preview-map.conf;

    server {
        listen 8080;
        server_name localhost;
        root /tmp;

        include nginx-social-preview.conf;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
