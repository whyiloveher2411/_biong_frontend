# Đặt trong khối http { } (một lần trên mỗi nginx).
# Include: include /path/to/nginx-social-preview-map.conf;

map $http_user_agent $is_social_crawler {
    default 0;
    ~*facebookexternalhit 1;
    ~*facebot               1;
    ~*meta-externalagent    1;
    ~*twitterbot            1;
    ~*linkedinbot           1;
    ~*whatsapp              1;
    ~*slackbot              1;
    ~*telegrambot           1;
    ~*discordbot            1;
    ~*bingbot               1;
}
