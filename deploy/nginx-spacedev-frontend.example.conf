# Ví dụ server block: spacedev.vn (CRA build tĩnh + social preview).
# Điều chỉnh root, ssl_certificate, resolver theo môi trường production.

# Trong http { }:
#   include /etc/nginx/snippets/spacedev-social-preview-map.conf;

server {
    listen 443 ssl http2;
    server_name spacedev.vn www.spacedev.vn;

    # ssl_certificate ...
    # ssl_certificate_key ...

    root /var/www/spacedev.vn;
    index index.html;

    # Social preview cho /tin-tuc/{year}/{id} (Facebook, Zalo, LinkedIn, ...)
    include /var/www/spacedev.vn/deploy/nginx-social-preview.conf;

    # SPA fallback — các route React khác
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|map)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

server {
    listen 80;
    server_name spacedev.vn www.spacedev.vn;
    return 301 https://spacedev.vn$request_uri;
}
