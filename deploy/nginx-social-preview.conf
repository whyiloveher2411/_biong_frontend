# Snippet cho server { } phục vụ CRA static (spacedev.vn).
# Yêu cầu: include deploy/nginx-social-preview-map.conf trong http { }.
#
# Thứ tự include (trước location / SPA):
#   include /path/to/build/deploy/nginx-social-preview.conf;

# Bắt crawler mạng xã hội → proxy HTML OG từ API (không redirect).
location ~ ^/tin-tuc/([0-9][0-9][0-9][0-9])/([^/]+)/?$ {
    set $article_year $1;
    set $article_id $2;

    if ($is_social_crawler = 1) {
        return 418;
    }

    try_files $uri $uri/ /index.html;
}

error_page 418 = @article_social_preview;

location @article_social_preview {
    # Bắt buộc khi proxy_pass dùng biến / upstream động.
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;

    proxy_pass https://api.spacedev.vn/api/frontend/v1.0/vn4-e-learning/marketing/article-social-preview?year=$article_year&id=$article_id&lang=vi;
    proxy_ssl_server_name on;
    proxy_set_header Host api.spacedev.vn;
    proxy_set_header Accept text/html;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_hide_header X-Powered-By;
}
